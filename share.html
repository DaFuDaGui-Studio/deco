<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEST WEB SHARE</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=Monsieur+La+Doulaise&family=Noto+Sans+TC:wght@100..900&family=Noto+Serif+TC:wght@200..900&family=Noto+Serif+JP:wght@200..900&family=Noto+Sans+JP:wght@100..900&display=swap"
    rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Alpine -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

</head>

<body>
  <main x-data="{
    shareData: {
      title: 'TEST WEB SHARE',
      text: 'This is a test for Web Share API.',
      url: 'window.location.href'
    },
    shareInstagram() {
      const url = window.location.href

      // 1. 複製連結
      navigator.clipboard.writeText(url).then(() => {
        // 2. 嘗試開啟 IG App (若有安裝)
        // 使用 iframe 避免錯誤訊息
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'instagram://';
        document.body.appendChild(iframe);
        // 3. 退路：若沒裝 App 則開網頁版
        setTimeout(() => {
          document.body.removeChild(iframe);
          window.open('https://www.instagram.com/direct/inbox/', '_blank');
        }, 500);
      });
    },
    shareThreads() {
      const content = `這是我在網站上看到的超酷內容！\n ${window.location.href}`;
      const threadsUrl = `https://www.threads.net/intent/post?text=${encodeURIComponent(content)}`;
      window.open(threadsUrl, '_blank');
    },
    shareFB() {
      const shareUrl = window.location.href;
      const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;

      // 開啟小視窗
      window.open(facebookUrl, 'facebook-share-dialog', 'width=800,height=600');
    },
    shareLine() {
      const shareUrl = window.location.href;
      const lineUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}`;
      window.open(lineUrl, '_blank');
    },
    shareWeb() {
      if (navigator.share) {
        navigator.share({
          ...this.shareData,
          url: window.location.href
        })
          .then(() => console.log('分享成功'))
          .catch((error) => console.log('分享失敗', error));
      } else {
        alert('您的瀏覽器不支援 Web Share API');
      }
    }
  }">
    <button @click="shareInstagram">Instagram</button>
    <button @click="shareFB ">Facebook</button>
    <button @click="shareLine">LINE</button>
    <button @click="shareThreads">Threads</button>
    <button @click="shareWeb">Web Share API (行動端)</button>
  </main>
</body>
</html>
